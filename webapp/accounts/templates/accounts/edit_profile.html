<h1>Edit profile</h1>

<form method="post" enctype="multipart/form-data">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Save changes</button>
</form>

{% if profile.profile_picture %}
    <h3>Current profile picture:</h3>
    <img src="{{ profile.profile_picture.url }}" width="150">
{% endif %}
