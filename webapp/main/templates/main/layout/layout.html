{% load static %}
<!doctype html>
<html lang="pl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">

    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>

    <!-- Font Awesome CDN -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
        integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <title>{% block title %}Pasja Gotowania{% endblock %}</title>

    <link rel="stylesheet" href="{% static 'main/css/main.css' %}">

    <style>
        .messages-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 9999;
            max-width: 400px;
        }

        .message {
            background: rgba(30, 41, 59, 0.95);
            color: white;
            padding: 14px 18px;
            border-radius: 12px;
            margin-bottom: 10px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.25);
            border-left: 4px solid #22c55e;
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
        }

        .message.error {
            border-left-color: #ef4444;
        }

        .message.warning {
            border-left-color: #f59e0b;
        }

        .message.info {
            border-left-color: #3b82f6;
        }

        .message.success {
            border-left-color: #22c55e;
        }

        .message-hide {
            opacity: 0;
            transform: translateY(-10px);
            transition: all 0.5s ease;
        }

        .message {
            transition: all 0.5s ease;
        }
    </style>
</head>

<body>
    <div class="d-flex flex-nowrap">
        {% include 'main/layout/sidebar.html' %}

        <main class="py-5" style="margin-left: 340px;">
            <div class="container-sm" style="min-width: 997px;">
                <!-- Blok zawierający zawartość definiowaną przez aktualny widok -->

                {% if messages %}
                <div class="messages-container">
                    {% for message in messages %}
                    <div class="message {{ message.tags }}">
                        {{ message }}
                    </div>
                    {% endfor %}
                </div>
                {% endif %}

                {% block content %}
                {% endblock %}
            </div>
        </main>
    </div>

    <script>
        setTimeout(() => {
            const messages = document.querySelectorAll(".message");

            messages.forEach(msg => {
                msg.classList.add("message-hide");

                setTimeout(() => {
                    msg.remove();
                }, 500); // czas na animację
            });

        }, 6000); // 6 sekund
    </script>

</body>

</html>
