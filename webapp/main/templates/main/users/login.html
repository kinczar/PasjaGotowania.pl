{% extends 'main/layout/clean_layout.html' %}
{% load static %}

{% block title %}Logowanie{% endblock %}

{% block content %}

<style>
body {
    background: linear-gradient(135deg, #0f172a, #1e293b, #022c22);
}

.auth-box {
    background: rgba(30, 41, 59, 0.8);
    backdrop-filter: blur(16px);
    border-radius: 16px;
    padding: 40px;
    color: white;
    box-shadow: 0 10px 40px rgba(0,0,0,0.5);
}

.btn-auth {
    background: linear-gradient(135deg, #22c55e, #16a34a);
    border: none;
    color: white;
    font-weight: 600;
    transition: 0.3s;
}

.btn-auth:hover {
    background: linear-gradient(135deg, #16a34a, #15803d);
    transform: translateY(-2px);
}
</style>

<div class="d-flex align-items-center justify-content-center px-4" style="height: 100vh">
    <div class="auth-box w-100" style="max-width: 400px">

        <h2 class="text-center mb-4">Logowanie</h2>

        {% if messages %}
        <div class="alert alert-danger">
            {% for message in messages %}
                {{ message }}
            {% endfor %}
        </div>
        {% endif %}

        <form method="POST" action="/login">
            {% csrf_token %}

            <input type="text" name="username" placeholder="Nazwa użytkownika" class="form-control mb-3" required>

            <input type="password" name="password" placeholder="Hasło" class="form-control mb-3" required>

            <button type="submit" class="btn btn-auth w-100">
                Zaloguj się
            </button>
        </form>

    </div>
</div>

{% endblock %}
