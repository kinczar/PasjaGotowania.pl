{% extends 'main/layout/layout.html' %}

{% block title %}Zmień hasło{% endblock %}

{% block content %}
<div class="edit-profile-wrapper">
    <div class="edit-profile-card">
        <h2>Zmień hasło</h2>

        <form method="POST">
            {% csrf_token %}

            <div class="form-group">
                <label for="{{ form.old_password.id_for_label }}">Obecne hasło</label>
                {{ form.old_password }}
            </div>

            <div class="form-group">
                <label for="{{ form.new_password1.id_for_label }}">Nowe hasło</label>
                {{ form.new_password1 }}
            </div>

            <div class="form-group">
                <label for="{{ form.new_password2.id_for_label }}">Powtórz nowe hasło</label>
                {{ form.new_password2 }}
            </div>

            <button type="submit" class="save-btn">Zmień hasło</button>
        </form>
    </div>
</div>

<style>
    .edit-profile-wrapper {
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 40px 20px 40px 180px;
        background: linear-gradient(135deg, #0f172a, #1e293b, #334155);
    }

    .edit-profile-card {
        width: 100%;
        max-width: 650px;
        background: rgba(255, 255, 255, 0.08);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border-radius: 20px;
        padding: 30px;
        color: white;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
    }

    .edit-profile-card h2 {
        text-align: center;
        margin-bottom: 25px;
    }

    .form-group {
        margin-bottom: 18px;
    }

    .form-group label {
        display: block;
        margin-bottom: 8px;
        font-weight: bold;
    }

    .form-group input {
        width: 100%;
        padding: 12px;
        border-radius: 10px;
        border: none;
        outline: none;
        background: rgba(255, 255, 255, 0.12);
        color: white;
        box-sizing: border-box;
    }

    .save-btn {
        width: 100%;
        padding: 12px;
        border: none;
        border-radius: 12px;
        background-color: #3b82f6;
        color: white;
        font-size: 16px;
        cursor: pointer;
        transition: 0.3s ease;
    }

    .save-btn:hover {
        background-color: #2563eb;
    }
</style>
{% endblock %}
